<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
</head>
<body>
<center>
<h1>Registration Form</h1>
<form action="login.html">

    Name: <input type="text" name="name" placeholder="Enter name" required><br/>
    Phone: <input type="number" name="mobile" placeholder="Enter Phone no" required><br/>
    Email: <input type="email" name="email" placeholder="Enter Email" required><br/>
    Password: <input type="password" name="pswd" placeholder="Enter Password" required><br/>
    Confirm password: <input type="password" name="cpswd" placeholder="Confirm Password" required><br/>
    <input type="radio"  name="Gender"  value="Male" >Male <br/>
    <input type="radio"  name="Gender"  value="Female" >Female <br/>
    <input type="radio"  name="Gender"  value="Other" >Other<br/>
    <button>Signup</button>
</form>
<a href="./login.html">Already Login?</a>
</center>
</body>
</html>
